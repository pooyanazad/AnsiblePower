<!DOCTYPE html>
<html lang="en" class="{{ 'dark' if dark_mode else '' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>{% block title %}AnsiblePower{% endblock %}</title>
    <!-- SVG Favicon: lightning bolt matching AnsiblePower brand -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    {% include 'partials/_header.html' %}
    <div class="container-fluid">
      <div class="row">
          <nav class="col-md-2 d-none d-md-block sidebar">
              {% include 'partials/_sidebar.html' %}
          </nav>
          <main role="main" class="col-md-10 ml-sm-auto px-4">
              {% block content %}{% endblock %}
          </main>
      </div>
    </div>
    <!-- Toast Container -->
    <div id="toast-container" aria-live="polite" aria-atomic="true" class="position-fixed" style="z-index: 1050; right: 20px; bottom: 20px;"></div>

    <!-- jQuery (required by Bootstrap 4 JS components: navbar toggle, dropdowns, modals) -->
    <script src="https://code.jquery.com/jquery-3.7.1.slim.min.js" integrity="sha384-5AkRS45j4ukf+JbWAfHL8P4onPA9p0KwwP7pUdjSQA3ss9edbJUJc/XcYAiheSSz" crossorigin="anonymous"></script>
    <!-- Bootstrap 4 JS + Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
